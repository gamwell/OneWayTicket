<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport optimisé mobile -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />

    <!-- SEO -->
    <meta
      name="description"
      content="ONEWAYTICKET - Ta billetterie événementielle exclusive."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- 🔥 Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Poppins:wght@400;600;700;900&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Supabase (optimisation DNS) -->
    <link
      rel="preconnect"
      href="https://vnijdjjzgruujvagrihu.supabase.co"
      crossorigin
    />

    <title>ONEWAYTICKET - Billetterie Événementielle</title>

    <!-- Loader initial (avant React) -->
    <style>
      body {
        background-color: #1a0525;
        margin: 0;
        overflow: hidden;
      }

      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        font-family: "Poppins", sans-serif;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(253, 186, 116, 0.1);
        border-top: 4px solid #fcd34d;
        border-radius: 50%;
        animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loader-text {
        color: #fcd34d;
        font-size: 10px;
        letter-spacing: 4px;
        margin-top: 24px;
        font-weight: 800;
        text-transform: uppercase;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <p class="loader-text">Initialisation du système...</p>
      </div>
    </div>

    <!-- Entrée Vite -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
